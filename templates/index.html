<script>
// ── Navegação ─────────────────────────────────────────────────────────────────
function ir(id, btn) {
  document.querySelectorAll('section').forEach(s => s.classList.remove('ativa'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('ativo'));
  document.getElementById(id).classList.add('ativa');
  btn.classList.add('ativo');
  if (id === 'relatorio')  { carregarChips(); }
  if (id === 'psicologos') { carregarTabelaPsi(); }
  if (id === 'pacientes')  { carregarTabelaPac(); }
}

// ── Mensagens ─────────────────────────────────────────────────────────────────
function msg(id, texto, tipo) {
  const el = document.getElementById(id);
  el.textContent = texto;
  el.className = `msg ${tipo}`;
  setTimeout(() => el.className = 'msg', 4000);
}

function v(id) { return document.getElementById(id).value.trim(); }

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function api(url, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r;
}

// ── Calendário ────────────────────────────────────────────────────────────────
let calData  = new Date();
let sessoes  = [];
const MESES  = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIAS   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const hoje   = new Date();

function renderCal() {
  const ano = calData.getFullYear();
  const mes = calData.getMonth();
  document.getElementById('cal-titulo').textContent = `${MESES[mes]} ${ano}`;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = DIAS.map(d => `<div class="cal-dow">${d}</div>`).join('');

  const primeiro = new Date(ano, mes, 1).getDay();
  const total    = new Date(ano, mes + 1, 0).getDate();

  for (let i = 0; i < primeiro; i++) {
    grid.innerHTML += `<div class="cal-dia vazio"></div>`;
  }

  for (let d = 1; d <= total; d++) {
    const dataStr = `${String(d).padStart(2,'0')}/${String(mes+1).padStart(2,'0')}/${ano}`;
    const isSel   = sessoes.some(s => s.data === dataStr);
    const isHoje  = d === hoje.getDate() && mes === hoje.getMonth() && ano === hoje.getFullYear();
    let cls = 'cal-dia';
    if (isSel)  cls += ' selecionado';
    if (isHoje && !isSel) cls += ' hoje';
    grid.innerHTML += `<div class="${cls}" onclick="toggleData('${dataStr}')">${d}</div>`;
  }
}

function calNav(dir) {
  calData.setMonth(calData.getMonth() + dir);
  renderCal();
}

function toggleData(dataStr) {
  const idx = sessoes.findIndex(s => s.data === dataStr);
  if (idx >= 0) {
    sessoes.splice(idx, 1);
  } else {
    const inicio = v('r-hora-inicio') || '09:00';
    const fim    = v('r-hora-fim')    || '10:00';
    const num    = parseInt(v('r-num-sessoes')) || 1;
    sessoes.push({ data: dataStr, horario: `${inicio}-${fim}`, num_sessoes: num });
  }
  renderCal();
  renderSessoes();
}

function renderSessoes() {
  const el = document.getElementById('sessoes-lista');
  if (sessoes.length === 0) { el.innerHTML = '<span style="color:var(--muted);font-size:13px">Nenhuma sessão selecionada</span>'; return; }
  el.innerHTML = sessoes.map((s, i) => `
    <div class="sessao-tag">
      📅 ${s.data} &nbsp;|&nbsp; ${s.horario} &nbsp;|&nbsp; ${s.num_sessoes} sessão(ões)
      <button onclick="removerSessao(${i})">✕</button>
    </div>
  `).join('');
}

function removerSessao(i) {
  sessoes.splice(i, 1);
  renderCal();
  renderSessoes();
}

async function carregarChips() {
  const [rpsi, rpac] = await Promise.all([

    api('/pacientes').then(r => r.json()),
  ]);

  const elPsi = document.getElementById('chips-psi');
  const elPac = document.getElementById('chips-pac');

  elPsi.innerHTML = rpsi.length

    : '<span style="color:var(--muted);font-size:13px">Nenhum psicólogo cadastrado</span>';

  elPac.innerHTML = rpac.length
    ? rpac.map(p => `<div class="chip" onclick="preencherPac(${JSON.stringify(p).replace(/"/g,'&quot;')})">🧑‍⚕️ ${p.nome}</div>`).join('')
    : '<span style="color:var(--muted);font-size:13px">Nenhum paciente cadastrado</span>';
}

async function gerarPdf() {
  if (sessoes.length === 0) { msg('msg-rel', 'Selecione ao menos uma sessão no calendário.', 'err'); return; }

  const dados = {
    ano: v('r-ano') || '2026',
    psicologo: {
      nome:       v('r-psi-nome'),
      titulo:     v('r-psi-titulo'),
      crp:        v('r-psi-crp'),
      cpf:        v('r-psi-cpf'),
      telefone:   v('r-psi-telefone'),
      nome_curto: v('r-psi-nome_curto'),
      endereco:   v('r-psi-endereco'),
      bairro:     v('r-psi-bairro'),
      cidade:     v('r-psi-cidade'),
      cep:        v('r-psi-cep'),
    },
    paciente: {
      nome:         v('r-pac-nome'),
      tipo_terapia: v('r-pac-tipo_terapia'),
      diagnostico:  v('r-pac-diagnostico'),
      cid:          v('r-pac-cid'),
    },
    sessoes: sessoes,
  };

  try {
    const r = await fetch('/gerar_pdf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(dados),
    });

    if (!r.ok) {
      const err = await r.json();
      msg('msg-rel', err.error || 'Erro ao gerar PDF.', 'err');
      return;
    }

    
    const cd = r.headers.get('Content-Disposition');
    const nomeArq  = cd ? cd.split('filename=')[1].replace(/"/g, '') : 'relatorio.pdf';
    const blob = await r.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    console.log(cd)
    a.download = nomeArq;
    a.click();
    URL.revokeObjectURL(url);
    msg('msg-rel', 'PDF gerado com sucesso!', 'ok');
  } catch(e) {
    msg('msg-rel', 'Erro de conexão com o servidor.', 'err');
  }
}
