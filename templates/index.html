<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Relatório</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f4f4f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #9c1515;
  }
  header p {
    color: #666;
    font-size: 0.9rem;
    margin-top: 4px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0e0da;
    padding: 1.5rem 2rem;
    margin-bottom: 1.25rem;
  }

  .card-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #eee;
  }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label {
    font-size: 0.78rem;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .field input, .field select {
    padding: 8px 12px;
    border: 1px solid #ddd;
    border-radius: 7px;
    font-size: 0.95rem;
    background: #fafaf8;
    color: #111;
    transition: border 0.15s;
    width: 100%;
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: #2563eb;
    background: #fff;
  }

  /* ── Sessões ── */
  #sessoes-list { display: flex; flex-direction: column; gap: 0.75rem; }

  .sessao-row {
    display: grid;
    grid-template-columns: 1fr 1fr 90px 36px;
    gap: 8px;
    align-items: end;
    background: #fafaf8;
    border: 1px solid #e8e8e2;
    border-radius: 8px;
    padding: 10px 12px;
  }
  .sessao-row .field label { font-size: 0.72rem; }

  .btn-rm {
    background: #fee2e2;
    border: none;
    color: #b91c1c;
    border-radius: 7px;
    font-size: 1.1rem;
    cursor: pointer;
    height: 36px;
    width: 36px;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-rm:hover { background: #fecaca; }

  .btn-add {
    margin-top: 0.75rem;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px dashed #bbb;
    border-radius: 7px;
    padding: 7px 14px;
    font-size: 0.85rem;
    color: #555;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-add:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }

  /* ── Gerar ── */
  .btn-gerar {
    width: 100%;
    padding: 14px;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.15s;
    margin-top: 0.5rem;
  }
  .btn-gerar:hover { background: #2563eb; }
  .btn-gerar:disabled { background: #aaa; cursor: not-allowed; }

  /* ── Status / Preview ── */
  #status {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    display: none;
  }
  #status.ok { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; display: block; }
  #status.err { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; display: block; }
  #status.loading { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; display: block; }

  #download-link {
    display: none;
    margin-top: 0.75rem;
    width: 100%;
    text-align: center;
    padding: 12px;
    background: #16a34a;
    color: #fff;
    border-radius: 9px;
    font-weight: 600;
    font-size: 0.95rem;
    text-decoration: none;
  }
  #download-link:hover { background: #15803d; }

  @media (max-width: 600px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .sessao-row { grid-template-columns: 1fr 1fr; }
    .sessao-row .field:nth-child(3) { grid-column: 1; }
    .sessao-row .btn-rm { grid-column: 2; justify-self: end; }
    .card { padding: 1.25rem; }
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Gerador de Relatório Psicológico</h1>
    <p>Preencha os campos abaixo e clique em Gerar PDF</p>
  </header>

  <!-- PSICÓLOGO -->
  <div class="card">
    <div class="card-title">Dados do Psicólogo</div>
    <div class="grid-2" style="gap:1rem;">
      <div class="field" style="grid-column:1/-1">
        <label>Nome completo</label>
        <input id="psi-nome">
      </div>
      <div class="field">
        <label>Título / Especialidade</label>
        <input id="psi-titulo">
      </div>
      <div class="field">
        <label>Nome curto (tabela)</label>
        <input id="psi-curto">
      </div>
      <div class="field">
        <label>CRP</label>
        <input id="psi-crp">
      </div>
      <div class="field">
        <label>CPF</label>
        <input id="psi-cpf">
      </div>
      <div class="field">
        <label>Telefone</label>
        <input id="psi-tel">
      </div>
      <div class="field">
        <label>Endereço</label>
        <input id="psi-end">
      </div>
      <div class="field">
        <label>Bairro</label>
        <input id="psi-bairro">
      </div>
      <div class="field">
        <label>Cidade / Estado</label>
        <input id="psi-cidade">
      </div>
      <div class="field">
        <label>CEP</label>
        <input id="psi-cep">
      </div>
    </div>
  </div>

  <!-- PACIENTE -->
  <div class="card">
    <div class="card-title">Dados do Paciente</div>
    <div class="grid-2">
      <div class="field" style="grid-column:1/-1">
        <label>Nome completo</label>
        <input id="pac-nome">
      </div>
      <div class="field">
        <label>Tipo de terapia</label>
        <input id="pac-terapia">
      </div>
      <div class="field">
        <label>Diagnóstico</label>
        <input id="pac-diag">
      </div>
      <div class="field">
        <label>CID</label>
        <input id="pac-cid">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Sessões de Atendimento</div>
    <div id="sessoes-list"></div>
    <button class="btn-add" onclick="adicionarSessao()">+ Adicionar sessão</button>
  </div>

  <div class="card" style="border:none; background:none; padding:0; margin-bottom:2rem;">
    <button class="btn-gerar" id="btn-gerar" onclick="gerarPDF()">Gerar PDF</button>
    <div id="status"></div>
    <a id="download-link" href="#" download="relatorio.pdf">⬇ Baixar PDF</a>
  </div>
</div>

<script>


let contSessao = 0;

function adicionarSessao(data="", horario="", num=1) {
  const id = contSessao++;
  const list = document.getElementById("sessoes-list");
  const row = document.createElement("div");
  row.className = "sessao-row";
  row.id = `sessao-${id}`;
  row.innerHTML = `
    <div class="field">
      <label>Data (DD/MM/AAAA)</label>
      <input class="s-data" value="${data}">
    </div>
    <div class="field">
      <label>Horário</label>
      <input class="s-horario" value="${horario}">
    </div>
    <div class="field">
      <label>Sessões</label>
      <input class="s-num" type="number" min="1" max="10" value="${num}" style="width:100%">
    </div>
    <button class="btn-rm" onclick="removerSessao('sessao-${id}')" title="Remover">×</button>
  `;
  list.appendChild(row);
}

function removerSessao(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function coletarDados() {
  const sessoes = [];
  document.querySelectorAll(".sessao-row").forEach(row => {
    const data = row.querySelector(".s-data").value.trim();
    const horario = row.querySelector(".s-horario").value.trim();
    const num = parseInt(row.querySelector(".s-num").value) || 1;
    if (data) sessoes.push({data, horario, num_sessoes: num});
  });

  return {
    psicologo: {
      nome: document.getElementById("psi-nome").value.trim(),
      titulo: document.getElementById("psi-titulo").value.trim(),
      crp: document.getElementById("psi-crp").value.trim(),
      cpf: document.getElementById("psi-cpf").value.trim(),
      telefone: document.getElementById("psi-tel").value.trim(),
      endereco: document.getElementById("psi-end").value.trim(),
      bairro: document.getElementById("psi-bairro").value.trim(),
      cidade: document.getElementById("psi-cidade").value.trim(),
      cep: document.getElementById("psi-cep").value.trim(),
      nome_curto: document.getElementById("psi-curto").value.trim(),
    },
    paciente: {
      nome: document.getElementById("pac-nome").value.trim(),
      tipo_terapia: document.getElementById("pac-terapia").value.trim(),
      diagnostico: document.getElementById("pac-diag").value.trim(),
      cid: document.getElementById("pac-cid").value.trim(),
    },
    sessoes
  };
}

async function gerarPDF() {
  const btn = document.getElementById("btn-gerar");
  const status = document.getElementById("status");
  const link = document.getElementById("download-link");

  status.className = "loading";
  status.textContent = "Gerando PDF via Python...";
  link.style.display = "none";
  btn.disabled = true;

  const dados = coletarDados();
  if (!dados.sessoes.length) {
    status.className = "err";
    status.textContent = "Adicione pelo menos uma sessão.";
    btn.disabled = false;
    return;
  }

  try {
    const resp = await fetch("/gerar_pdf", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(dados)
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(err);
    }

    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.download = `relatorio_${dados.paciente.nome.split(" ")[0]}.pdf`;
    link.style.display = "block";

    status.className = "ok";
    status.textContent = "PDF gerado com sucesso!";
  } catch (e) {
    status.className = "err";
    status.textContent = "Erro: " + e.message;
  }

  btn.disabled = false;
}

// Preencher sessões iniciais
sessoesIniciais.forEach(s => adicionarSessao(s.data, s.horario, s.num));
</script>
</body>
</html>
